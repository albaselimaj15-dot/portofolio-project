<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Skills</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: div}"></div>


    <!-- CONTENT -->
    <div class="container-fluid p-4">

        <h2 class="mb-4">My Skills</h2>


        <!-- SUCCESS MESSAGE -->
        <div th:if="${successMessage}"
             class="alert alert-success"
             th:text="${successMessage}">
        </div>


        <!-- ERROR MESSAGE -->
        <div th:if="${errorMessage}"
             class="alert alert-danger"
             th:text="${errorMessage}">
        </div>



        <!-- ADD FORM ONLY ADMIN -->
        <div th:if="${isAdmin}" class="card shadow-sm p-4 mb-4">

            <h5 class="mb-3">Add New Skill</h5>


            <form id="skillForm"
                  th:action="@{/skills/save}"
                  th:object="${skill}"
                  method="post">


                <div class="mb-3">

                    <input type="text"
                           th:field="*{name}"
                           class="form-control"
                           placeholder="Skill name">


                    <p class="text-danger mt-1"
                       th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}">
                    </p>

                </div>



                <div class="mb-3">

                    <select th:field="*{level}"
                            class="form-select">

                        <option value="">Choose level</option>
                        <option value="BEGINNER">BEGINNER</option>
                        <option value="INTERMEDIATE">INTERMEDIATE</option>
                        <option value="ADVANCED">ADVANCED</option>

                    </select>


                    <p class="text-danger mt-1"
                       th:if="${#fields.hasErrors('level')}"
                       th:errors="*{level}">
                    </p>

                </div>



                <button id="saveBtn"
                        type="submit"
                        class="btn btn-success">

                    Add Skill

                </button>


            </form>

        </div>





        <!-- TABLE -->

        <div class="table-responsive">

            <table class="table table-bordered table-hover align-middle">


                <thead class="table-dark">

                <tr>

                    <th style="width:70px;">
                        ID
                    </th>


                    <th>
                        Name
                    </th>


                    <th style="width:180px;">
                        Level
                    </th>


                    <th th:if="${isAdmin}" style="width:180px;">
                        Actions
                    </th>


                </tr>

                </thead>




                <tbody>


                <tr th:each="skill : ${skills}">


                    <td th:text="${skill.id}"></td>


                    <td th:text="${skill.name}"></td>


                    <td th:text="${skill.level}"></td>



                    <!-- ACTIONS ONLY ADMIN -->

                    <td th:if="${isAdmin}" class="text-nowrap">


                        <div class="d-flex gap-2">


                            <a th:href="@{/skills/edit/{id}(id=${skill.id})}"
                               class="btn btn-primary btn-sm">

                                Edit

                            </a>




                            <form th:action="@{/skills/delete/{id}(id=${skill.id})}"
                                  method="post"
                                  class="m-0">


                                <button type="submit"
                                        class="btn btn-danger btn-sm"
                                        onclick="return confirm('Are you sure you want to delete this skill?')">

                                    Delete

                                </button>


                            </form>


                        </div>


                    </td>



                </tr>




                <!-- EMPTY TABLE -->

                <tr th:if="${skills == null or skills.isEmpty()}">


                    <td th:colspan="${isAdmin ? 4 : 3}"
                        class="text-center py-4">


                        <h5>
                            No skills found.
                        </h5>



                        <p class="mb-0"
                           th:if="${isAdmin}">

                            Click "Add Skill" to create your first skill.

                        </p>



                        <p class="mb-0"
                           th:unless="${isAdmin}">

                            No skills are available yet.

                        </p>



                    </td>


                </tr>



                </tbody>


            </table>


        </div>


    </div>


</div>





<script>

    let form = document.getElementById("skillForm");
    let btn = document.getElementById("saveBtn");


    if(form && btn){

        form.addEventListener("submit", function(){

            btn.disabled = true;

            btn.innerHTML =
                'Saving <span class="spinner-border spinner-border-sm"></span>';

        });

    }


</script>



</body>

</html>
