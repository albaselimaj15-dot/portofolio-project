<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-3">My Projects</h2>

<!-- ================= CREATE FORM ================= -->
<div th:if="${isAdmin}" class="card p-3 mb-4">

    <h5>Add New Project</h5>

    <form action="/projects" method="post" enctype="multipart/form-data">

        <input type="text" name="title" class="form-control mb-2" placeholder="Title" required>

        <input type="text" name="description" class="form-control mb-2" placeholder="Description" required>

        <input type="text" name="link" class="form-control mb-2" placeholder="Link">

        <!-- CATEGORY -->
        <label>Category</label>
        <select name="categoryId" class="form-select mb-2" required>
            <option value="">Select Category</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
        </select>

        <!-- SKILLS (MULTI) -->
        <label>Skills</label>
        <select name="skillIds" class="form-select mb-2" multiple>
            <option th:each="s : ${skills}"
                    th:value="${s.id}"
                    th:text="${s.name}">
            </option>
        </select>

        <!-- IMAGE -->
        <input type="file" name="image" class="form-control mb-2">

        <button type="submit" class="btn btn-success">Add Project</button>

    </form>

</div>

<!-- ================= FILTER ================= -->
<div class="card p-3 mb-4">

    <form method="get" action="/projects">

        <input type="text" name="search" class="form-control mb-2" placeholder="Search...">

        <!-- CATEGORY FILTER -->
        <select name="categoryId" class="form-select mb-2">
            <option value="">All Categories</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
        </select>

        <!-- SKILLS FILTER -->
        <select name="skillIds" class="form-select mb-2" multiple>
            <option th:each="s : ${skills}"
                    th:value="${s.id}"
                    th:text="${s.name}">
            </option>
        </select>

        <button class="btn btn-primary">Filter</button>

    </form>

</div>

<!-- ================= TABLE ================= -->
<table class="table table-bordered">

    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Link</th>
        <th>Image</th>
        <th th:if="${isAdmin}">Actions</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="project : ${projects}">

        <td th:text="${project.id}"></td>
        <td th:text="${project.title}"></td>
        <td th:text="${project.description}"></td>

        <td>
            <a th:href="${project.link}" target="_blank">Open</a>
        </td>

        <td>
            <img th:if="${project.imageUrl != null}"
                 th:src="${project.imageUrl}"
                 width="80">
        </td>

        <td th:if="${isAdmin}">
            <a th:href="@{'/projects/edit/' + ${project.id}}">Edit</a> |
            <a th:href="@{'/projects/delete/' + ${project.id}}">Delete</a> |
            <a th:href="@{'/projects/' + ${project.id} + '/categorize'}">Categorize</a>
        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
