<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-3">My Projects</h2>

<!-- ================= ADMIN CREATE FORM ================= -->
<div th:if="${isAdmin}" class="card p-3 mb-4">

    <h5>Add New Project</h5>
    <form action="/projects" method="post" enctype="multipart/form-data">

        <!-- TITLE -->
        <input type="text" name="title" placeholder="Title" required>
        <br><br>

        <!-- DESCRIPTION -->
        <input type="text" name="description" placeholder="Description" required>
        <br><br>

        <!-- LINK -->
        <input type="text" name="link" placeholder="Link">
        <br><br>

        <!-- CATEGORY (vetëm 1) -->
        <label>Category</label>
        <select name="categoryId" required>
            <option value="">Select Category</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
        </select>

        <br><br>

        <!-- SKILLS (multi) -->
        <div>
            <label>Skills</label>
            <select name="skillId">
                <option value="">Select Skills</option>
                <option th:each="s : ${skills}"
                        th:value="${s.id}"
                        th:text="${s.name}">
                </option>
            </select>
        </div>

        <br><br>

        <button type="submit">Add Project</button>

    </form>

</div>

<!-- ================= FILTER ================= -->
<div class="card p-3 mb-4">

    <form method="get" action="/projects">

        <div class="row g-2">

            <!-- SEARCH -->
            <div class="col-md-4">
                <input type="text"
                       name="search"
                       class="form-control"
                       placeholder="Search projects...">
            </div>

            <!-- CATEGORY -->
            <div class="col-md-3">
                <select name="categoryId" class="form-select">
                    <option value="">All Categories</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>
                </select>
            </div>

            <!-- SKILL -->
            <div class="col-md-3">
                <select name="skillId" class="form-select">
                    <option value="">All Skills</option>
                    <option th:each="s : ${skills}"
                            th:value="${s.id}"
                            th:text="${s.name}">
                    </option>
                </select>
            </div>

            <!-- BUTTON -->
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    Filter
                </button>
            </div>

        </div>

    </form>

</div>

<!-- ================= TABLE ================= -->
<table class="table table-bordered">

    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Link</th>
        <th>Image</th>
        <th th:if="${isAdmin}">Actions</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="project : ${projects}">

        <td th:text="${project.id}"></td>
        <td th:text="${project.title}"></td>
        <td th:text="${project.description}"></td>

        <td>
            <a th:href="${project.link}" target="_blank">Open</a>
        </td>

        <td>
            <img th:if="${project.imageUrl != null}"
                 th:src="${project.imageUrl}"
                 width="80">
        </td>

        <!-- ADMIN ACTIONS -->
        <td th:if="${isAdmin}">

            <a th:href="@{'/projects/edit/' + ${project.id}}">Edit</a>
            |
            <a th:href="@{'/projects/delete/' + ${project.id}}">Delete</a>
            |
            <a th:href="@{'/projects/' + ${project.id} + '/categorize'}">Categorize</a>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
