<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Project</title>
</head>
<body>

<h2>Edit Project</h2>

<form th:action="@{/projects/update}" th:object="${project}" method="post">

    <!-- ID -->
    <input type="hidden" th:field="*{id}" />

    <!-- TITLE -->
    <label>Title</label>
    <input type="text" th:field="*{title}" placeholder="Title" />
    <br><br>

    <!-- DESCRIPTION -->
    <label>Description</label>
    <input type="text" th:field="*{description}" placeholder="Description" />
    <br><br>

    <!-- LINK -->
    <label>Link</label>
    <input type="text" th:field="*{link}" placeholder="Link" />
    <br><br>

    <!-- CATEGORY -->
    <label>Category</label>
    <select name="categoryId">
        <option th:each="c : ${categories}"
                th:value="${c.id}"
                th:text="${c.name}">
        </option>
    </select>
    <br><br>

    <!-- SKILLS -->
    <label>Skills</label>
    <select name="skillIds" multiple>
        <option th:each="s : ${skills}"
                th:value="${s.id}"
                th:text="${s.name}">
        </option>
    </select>
    <br><br>

    <!-- SUBMIT -->
    <button type="submit">Update</button>

</form>

</body>
</html>
