<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Skills</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: div}">
    </div>

    <!-- CONTENT -->
    <div class="container mt-4">

        <h2 class="mb-4">My Skills</h2>



        <!-- SUCCESS MESSAGE -->
        <div th:if="${successMessage}"
             class="alert alert-success"
             th:text="${successMessage}">
        </div>

        <!-- ERROR MESSAGE -->

        <div th:if="${errorMessage}"
             class="alert alert-danger"
             th:text="${errorMessage}">
        </div>



        <!-- TABLE -->

        <table class="table table-bordered align-middle">

            <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Level</th>

                <th>Actions</th>

            </tr>

            </thead>


            <tbody>


            <tr th:each="skill : ${skills}">


                <td th:text="${skill.id}"></td>


                <td th:text="${skill.name}"></td>


                <td th:text="${skill.level}"></td>


                <!-- ACTIONS -->

                <td>

                    <div th:if="${isAdmin}" class="d-flex gap-2">

                        <a th:href="@{/skills/edit/{id}(id=${skill.id})}"
                           class="btn btn-primary btn-sm">
                            Edit
                        </a>


                        <form th:action="@{/skills/delete/{id}(id=${skill.id})}"
                              method="post">

                            <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this skill?')">
                                Delete
                            </button>

                        </form>

                    </div>

                </td>

            </tr>
            <!-- Empty State -->

            <tr th:if="${skills == null or skills.isEmpty()}">

                <td colspan="4" class="text-center">

                    <h5>No skills found.</h5>

                    <p>Click "Add Skill" to create your first skill.</p>

                </td>

            </tr>


            </tbody>


        </table>
    </div>

</div>

</body>

<script>
    let form = document.querySelector("form");
    let btn = document.getElementById("saveBtn");

    if(form && btn){
        form.addEventListener("submit", function () {

            btn.disabled = true;

            btn.innerHTML =
                'Saving <span class="spinner-border spinner-border-sm"></span>';
        });
    }
</script>

</html>
