<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Skills</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>


<body class="bg-light">


<div class="d-flex">


    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: div}">
    </div>



    <!-- CONTENT -->
    <div class="container mt-4">


        <h2 class="mb-4">
            My Skills
        </h2>



        <!-- SUCCESS MESSAGE -->

        <div th:if="${successMessage}"
             class="alert alert-success"
             th:text="${successMessage}">
        </div>



        <!-- ERROR MESSAGE -->

        <div th:if="${errorMessage}"
             class="alert alert-danger"
             th:text="${errorMessage}">
        </div>





        <!-- ADD SKILL FORM -->

        <div th:if="${isAdmin}"
             class="card mb-4">


            <div class="card-header">
                Add New Skill
            </div>


            <div class="card-body">

                <form id="skillForm"
                      th:action="@{/skills/save}"
                      th:object="${skill}"
                      method="post">


                    <div class="mb-3">

                        <label class="form-label">
                            Name
                        </label>


                        <input class="form-control"
                               th:field="*{name}"
                               placeholder="Enter skill name">


                    </div>



                    <div class="mb-3">

                        <label class="form-label">
                            Level
                        </label>


                        <select class="form-control"
                                th:field="*{level}">


                            <option value="BEGINNER">
                                BEGINNER
                            </option>


                            <option value="INTERMEDIATE">
                                INTERMEDIATE
                            </option>


                            <option value="ADVANCED">
                                ADVANCED
                            </option>


                        </select>


                    </div>



                    <button type="submit"
                            class="btn btn-primary">

                        Save Skill

                    </button>


                </form>


            </div>


        </div>





        <!-- SKILLS TABLE -->


        <table class="table table-bordered align-middle">


            <thead>


            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Level</th>

                <th th:if="${isAdmin}">
                    Actions
                </th>


            </tr>


            </thead>




            <tbody>



            <tr th:each="skill : ${skills}">


                <td th:text="${skill.id}"></td>


                <td th:text="${skill.name}"></td>


                <td th:text="${skill.level}"></td>




                <!-- ACTIONS ONLY FOR ADMIN -->

                <td th:if="${isAdmin}">


                    <div class="d-flex gap-2">



                        <!-- EDIT -->

                        <a th:href="@{/skills/edit/{id}(id=${skill.id})}"
                           class="btn btn-primary btn-sm">

                            Edit

                        </a>




                        <!-- DELETE -->

                        <form th:action="@{/skills/delete/{id}(id=${skill.id})}"
                              method="post">


                            <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this skill?')">


                                Delete


                            </button>


                        </form>



                    </div>


                </td>



            </tr>






            <!-- EMPTY STATE -->

            <tr th:if="${skills == null or skills.isEmpty()}">


                <td th:attr="colspan=${isAdmin ? 4 : 3}"
                    class="text-center">


                    <h5>
                        No skills found.
                    </h5>


                    <p th:if="${isAdmin}">
                        Add your first skill above.
                    </p>


                </td>


            </tr>




            </tbody>



        </table>




    </div>


</div>





<script>

    const form = document.getElementById("skillForm");


    if(form){

        form.addEventListener("submit", function(){


            const button = form.querySelector("button[type='submit']");


            if(button){

                button.disabled = true;


                button.innerHTML =
                    'Saving <span class="spinner-border spinner-border-sm"></span>';

            }


        });

    }


</script>


</body>

</html>
