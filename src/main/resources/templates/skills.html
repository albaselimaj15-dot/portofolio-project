<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Skills</title>
</head>
<body>

<h2>My Skills</h2>

<form action="/skills" method="post">

    <input type="text" name="name" placeholder="Skill name" required />
    <br>

    <input type="text" name="level" placeholder="Level" required />
    <br>

    <button type="submit">Create</button>
</form>

<hr>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Level</th>
        <th>Action</th>
    </tr>

    <tr th:each="skill : ${skills}">
        <td th:text="${skill.id}"></td>
        <td th:text="${skill.name}"></td>
        <td th:text="${skill.level}"></td>

        <td>
            <a th:href="@{'/skills/edit/' + ${skill.id}}">
                Update
            </a>

            <a th:href="@{'/skills/delete/' + ${skill.id}}">
                Delete
            </a>
        </td>
    </tr>

</table>

</body>
</html>
