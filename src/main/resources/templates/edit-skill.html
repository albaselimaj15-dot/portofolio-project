<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Skill</title>
</head>
<body>

<h2>Edit Skill</h2>

<form action="/skills/update" method="post">

    <input type="hidden"
           name="id"
           th:value="${skill.id}" />

    <label>Name:</label>
    <input type="text"
           name="name"
           th:value="${skill.name}" />

    <br><br>

    <label>Level:</label>
    <select name="level">

        <option th:selected="${skill.level=='BEGINNER'}">
            BEGINNER
        </option>

        <option th:selected="${skill.level=='INTERMEDIATE'}">
            INTERMEDIATE
        </option>

        <option th:selected="${skill.level=='ADVANCED'}">
            ADVANCED
        </option>

    </select>

    <br><br>

    <button type="submit">
        Update
    </button>

</form>

</body>
</html>
