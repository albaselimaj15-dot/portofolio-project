<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Portfolio System</span>

    <form action="/logout" method="post">
        <button class="btn btn-danger btn-sm">Logout</button>
    </form>
</nav>

<!-- MAIN LAYOUT -->
<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-12 col-md-3 col-lg-2 bg-dark text-white min-vh-100 p-3">

            <h5 class="mb-4">Menu</h5>

            <a class="text-white d-block mb-2" href="/projects">Projects</a>
            <a class="text-white d-block mb-2" href="/skills">Skills</a>
            <a class="text-white d-block mb-2" href="/profile">Profile</a>

        </div>

        <!-- CONTENT -->
        <div class="col-12 col-md-9 col-lg-10">

            <div class="container mt-5">

                <!-- WELCOME -->
                <div class="card shadow-sm p-4 mb-4">
                    <h3>
                        Welcome,
                        <span class="text-primary" th:text="${user}">User</span>!
                    </h3>
                    <p class="text-muted">Manage your portfolio efficiently</p>
                </div>

                <!-- ADMIN SECTION -->
                <div th:if="${isAdmin}">

                    <div class="row">

                        <div class="col-12 col-md-4 mb-3">
                            <div class="card shadow-sm p-3 text-center">
                                <h5>Total Projects</h5>
                                <h2 th:text="${projectCount}">0</h2>
                            </div>
                        </div>

                        <div class="col-12 col-md-4 mb-3">
                            <div class="card shadow-sm p-3 text-center">
                                <h5>Total Skills</h5>
                                <h2 th:text="${skillCount}">0</h2>
                            </div>
                        </div>

                        <div class="col-12 col-md-4 mb-3">
                            <div class="card shadow-sm p-3 text-center">
                                <h5>Categories</h5>
                                <h2 th:text="${categoryCount}">0</h2>
                            </div>
                        </div>

                    </div>

                    <!-- RECENT ACTIVITIES -->
                    <div class="card shadow-sm p-3 mt-4">

                        <h4 class="mb-3">Recent Activities</h4>

                        <ul class="list-group list-group-flush">
                            <li class="list-group-item" th:each="a : ${activities}">
                                <span th:text="${a.message}"></span>
                            </li>
                        </ul>

                    </div>

                    <!-- ACTIVITY COUNT -->
                    <div class="row mt-4">

                        <div class="col-12 col-md-3">
                            <div class="card p-3 text-center">
                                <h6>Activities</h6>
                                <h3 th:text="${activityCount}">0</h3>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
