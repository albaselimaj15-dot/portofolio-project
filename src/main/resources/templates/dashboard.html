<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- NAVBAR (HEADER) -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Portfolio System</span>

    <form action="/logout" method="post">
        <button class="btn btn-danger btn-sm">Logout</button>
    </form>
</nav>

<div class="container-fluid">

    <div class="row">

        <!-- SlIDEBAR -->
        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h5 class="mb-4">Menu</h5>


            <a class="text-white d-block mb-2" href="/projects">Projects</a>
            <a class="text-white d-block mb-2" href="/skills">Skills</a>
            <a class="text-white d-block mb-2" href="/profile">Profile</a>

        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10">

            <div class="container mt-5">


                <div class="card shadow-sm p-4 mb-4">

                    <h3>
                        Welcome,
                        <span class="text-primary" th:text="${user}">User</span>!
                    </h3>

                    <p class="text-muted">Manage your portfolio efficiently</p>

                </div>

                <!-- STATISTICS CARDS -->
                <div th:if="${isAdmin}">
                <div class="row">

                    <div class="col-md-3 mb-3">
                        <div class="card shadow-sm p-3 text-center">
                            <h5>Total Projects</h5>
                            <h2 th:text="${projectCount}">0</h2>
                        </div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <div class="card shadow-sm p-3 text-center">
                            <h5>Total Skills</h5>
                            <h2 th:text="${skillCount}">0</h2>
                        </div>
                    </div>



                    <div class="col-md-3 mb-3">
                        <div class="card shadow-sm p-3 text-center">
                                <h5 class="card-title">Categories</h5>
                                <h2 th:text="${categoryCount}">0</h2>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
