<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Portfolio System</span>

    <form action="/logout" method="post">
        <button class="btn btn-danger btn-sm">Logout</button>
    </form>
</nav>

<!-- MAIN CONTAINER -->
<div class="container mt-5">

    <!-- WELCOME CARD -->
    <div class="card shadow-sm p-4 mb-4">

        <h3>
            Welcome,
            <span class="text-primary" th:text="${user}">User</span>!
        </h3>

        <p class="text-muted">Manage your portfolio efficiently</p>

    </div>

    <!-- ACTION CARDS -->
    <div class="row">

        <!-- Projects -->
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm p-3">
                <h5>Projects</h5>
                <p>Manage your portfolio projects</p>
                <a href="/projects" class="btn btn-success">Go to projects</a>
            </div>
        </div>

        <!-- Skills -->
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm p-3">
                <h5>Skills</h5>
                <p>Manage your technical skills</p>
                <a href="/skills" class="btn btn-success">Go to Skills</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
